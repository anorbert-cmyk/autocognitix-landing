# Rate-limit zone for /proxy/ API (defense-in-depth; proxy/main.py also enforces 30/min/IP).
# 10 req/s sustained, burst 20, nodelay — generous enough for legitimate tool usage.
# Must live at http{} scope; this file is included inside the stock nginx.conf http{} block.
limit_req_zone $binary_remote_addr zone=proxy_api:10m rate=10r/s;

# Wave 6 fix: explicit default_server to reject unknown Host headers (mitigates
# host-header injection + cache poisoning). Request comes in with Host: evil.com →
# nginx returns 421 Misdirected Request.
server {
    listen 8080 default_server;
    server_name _;
    return 421;
}

server {
    listen 8080;
    # Wave 6 fix: explicit allowlist — do NOT use wildcard `_` catch-all, which
    # made the site vulnerable to Host header injection and cache poisoning.
    server_name autocognitix.hu www.autocognitix.hu autocognitix-landing-production.up.railway.app localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version in Server header and error pages
    server_tokens off;

    # Wave 6 fix: hide backend fingerprint. `Server: uvicorn` header reveals
    # the Python ASGI server stack → targeted CVE surface.
    proxy_hide_header Server;
    proxy_hide_header X-Powered-By;

    # Cap request bodies — calculator/inspection payloads are <2KB; 1MB is ample.
    client_max_body_size 1m;

    # Logs to container stdout/stderr (Railway log streaming + works under non-root user).
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Default redirect to Hungarian
    location = / {
        return 302 /hu/;
    }

    # Proxy API routes to Python sidecar — tightened whitelist anchored with /?$
    # so /proxy/dtc_admin, /proxy/healthz etc. cannot slip through.
    # Regex quoted because nginx parses unquoted `{4}` as block delimiter
    location ~ "^/proxy/(health|calculator/evaluate|inspection/evaluate|services/search|dtc/search|dtc/[PBCUpbcu][0-9]{4})/?$" {
        limit_req zone=proxy_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8081;
        # Wave 6 smuggling fix: explicit HTTP/1.1 + Connection reset so nginx
        # doesn't silently downgrade to HTTP/1.0 + inject Connection:close.
        # Two parsers disagreeing on framing is the textbook smuggling
        # precondition; h11 is strict (mitigator) but defense-in-depth here.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Defense-in-depth: block accidentally shipped backup/editor files.
    location ~* \.(bak|old|backup|swp|orig)$ {
        deny all;
        return 404;
    }

    # Serve .html files without extension
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # SEO: Serve sitemap.xml and robots.txt
    location = /sitemap.xml {
        try_files $uri =404;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    # Trailing slash → index.html
    location ~ ^/(hu|en)/blog/?$ {
        try_files /$1/blog/index.html =404;
    }

    location ~ ^/hu/eszkozok/?$ {
        try_files /hu/eszkozok/index.html =404;
    }

    location ~ ^/en/tools/?$ {
        try_files /en/tools/index.html =404;
    }

    location ~ ^/(hu|en)/?$ {
        try_files /$1/index.html =404;
    }

    # Cache static assets — now includes json/webp/avif/xml/woff
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|json|webp|avif|xml)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Security headers (OWASP 2024+)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # X-XSS-Protection: 0 disables legacy browser XSS auditors (OWASP guidance)
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP hardened by Lead 9 (security-sentinel audit, 2026-04-21) — OWASP CSP Cheat Sheet 2024+:
    #   - base-uri 'self'                         — prevents <base href=...> hijack of relative URLs
    #   - form-action 'self' https://valid8strategy.app.n8n.cloud — only same-origin or n8n webhook may receive form POSTs
    #   - object-src 'none'                       — kills <embed>/<object>/<applet> plugin abuse (legacy Flash/PDF)
    #   - upgrade-insecure-requests               — auto-upgrades any http:// subresource to https://
    #   - manifest-src 'self'                     — defense-in-depth for PWA manifest.json (not in default-src fallback on older browsers)
    #   - worker-src 'self'                       — defense-in-depth for Web Workers / Service Workers
    # connect-src keeps valid8strategy.app.n8n.cloud for newsletter (hu/en index.html, confirm.html, unsubscribe.html).
    # TODO(security, DEVOPS-M5): Move inline scripts (JSON-LD + bootstrap JS) to external files with per-request nonces
    # or SHA-256 hashes, then drop 'unsafe-inline' from script-src. Inline <style> blocks follow same path. Owned by
    # frontend-lead; until then, 'unsafe-inline' is retained because removal would break every homepage and tool page.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self' https://valid8strategy.app.n8n.cloud; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://valid8strategy.app.n8n.cloud; manifest-src 'self'; worker-src 'self'; frame-ancestors 'self'; upgrade-insecure-requests" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Permissions-Policy expanded per OWASP Secure Headers 2024+ — deny all sensors/payment/USB/MIDI (site never needs them).
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), midi=()" always;

    # Gzip — text-only types (never gzip raster images; svg is text-based OK)
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types
        text/css
        text/plain
        text/xml
        application/javascript
        application/json
        application/ld+json
        application/xml
        application/rss+xml
        image/svg+xml;

    # -----------------------------------------------------------------------
    # TODO(devops, performance): Brotli compression — 15-25% smaller payloads
    # than gzip for HTML/CSS/JS. Kept commented-out because the stock
    # `nginx:1.27-alpine3.20` base image does NOT ship the `ngx_brotli`
    # dynamic module. Enabling requires ONE of:
    #
    #   (a) Switch base to `nginxinc/nginx-unprivileged:alpine` and install
    #       nginx-module-brotli via apk (module shipped as separate package).
    #       Also moves the container to built-in non-root uid 101 — aligns
    #       with our current `USER app` setup (uid 101) — so this is the
    #       recommended path. Tradeoff: a non-Docker-official base image
    #       (nginxinc is the upstream nginx team's hardened variant,
    #       trustworthy but adds a supply-chain dependency).
    #
    #   (b) Multi-stage Dockerfile that compiles brotli from source against
    #       the nginx 1.27 source tree. Works but adds ~2 minutes to CI
    #       build and a C toolchain to the build stage.
    #
    # Until (a) or (b) ships, these directives are inert. Once the base
    # image ships brotli, uncomment — configuration below is production-ready.
    # -----------------------------------------------------------------------
    # brotli on;
    # brotli_comp_level 6;                 # 4 is faster, 11 is smaller; 6 is the performant middle ground
    # brotli_min_length 1024;              # Match gzip_min_length semantics
    # brotli_static on;                    # Serve pre-compressed .br files if present (zero CPU cost)
    # brotli_types
    #     text/plain
    #     text/css
    #     text/xml
    #     application/json
    #     application/javascript
    #     application/ld+json
    #     application/xml
    #     application/rss+xml
    #     image/svg+xml;

    # Custom 404 — PRESERVE 404 status (=404) so search engines deindex missing URLs.
    # Without =404, nginx would serve /hu/index.html with HTTP 200 (SEO poison).
    error_page 404 =404 /hu/index.html;
}
