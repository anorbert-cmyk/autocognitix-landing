server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Default redirect to Hungarian
    location = / {
        return 302 /hu/;
    }

    # Proxy API routes to Python sidecar (whitelisted routes only)
    location ~ ^/proxy/(health|calculator|inspection|services|dtc) {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Serve .html files without extension
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # SEO: Serve sitemap.xml and robots.txt
    location = /sitemap.xml {
        try_files $uri =404;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    # Trailing slash → index.html
    location ~ ^/(hu|en)/blog/?$ {
        try_files /$1/blog/index.html =404;
    }

    location ~ ^/hu/eszkozok/?$ {
        try_files /hu/eszkozok/index.html =404;
    }

    location ~ ^/en/tools/?$ {
        try_files /en/tools/index.html =404;
    }

    location ~ ^/(hu|en)/?$ {
        try_files /$1/index.html =404;
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 1000;

    # Custom 404
    error_page 404 /hu/index.html;
}
