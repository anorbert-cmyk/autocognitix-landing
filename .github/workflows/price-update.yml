name: Update Market Prices

on:
  schedule:
    - cron: '0 4 * * *'  # Daily at 4 AM UTC
  workflow_dispatch:
    inputs:
      force_full_refresh:
        description: 'Force refresh all brands (ignore rotation)'
        type: boolean
        default: false

# Prevent overlapping cron + manual runs from double-pushing (DEVOPS-L4).
# cancel-in-progress: false — let the current run finish, then gate the next.
concurrency:
  group: price-update
  cancel-in-progress: false

# Workflow-level default: read-only (DEVOPS-H5). Only aggregate job elevates.
# issues: write is needed at workflow level so the `if: failure()` notification
# step in `aggregate` can open a tracking issue when the pipeline breaks.
permissions:
  contents: read
  issues: write

env:
  # 5 brands per day rotation — cycles through all 25 brands in 5 days
  BRANDS_PER_DAY: 5
  PYTHON_VERSION: '3.11'

jobs:
  # ==================================================================
  # Job 1: Fetch MNB exchange rate + determine today's brand rotation
  # ==================================================================
  fetch-rate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Fetch MNB exchange rate
        run: python scripts/fetch-mnb-rate.py

      # DEVOPS-H6: Pass workflow inputs/env via `env:` and read with os.environ
      # inside Python — never interpolate `${{ ... }}` into `python -c "..."` bodies.
      - name: Determine brand rotation
        id: rotation
        env:
          FORCE_FULL_REFRESH: ${{ inputs.force_full_refresh }}
          BRANDS_PER_DAY: ${{ env.BRANDS_PER_DAY }}
        run: |
          python <<'PY'
          import json
          import os
          from datetime import date

          brands = [
              'Suzuki', 'Opel', 'Volkswagen', 'Toyota', 'Ford',
              'Skoda', 'BMW', 'Mercedes-Benz', 'Audi', 'Renault',
              'Peugeot', 'Citroen', 'Hyundai', 'Kia', 'Fiat',
              'Dacia', 'Honda', 'Mazda', 'Nissan', 'Seat',
              'Volvo', 'Mitsubishi', 'Jeep', 'Alfa Romeo', 'Mini',
          ]

          force_all = os.environ.get('FORCE_FULL_REFRESH', 'false').lower() == 'true'
          per_day = int(os.environ.get('BRANDS_PER_DAY', '5'))

          if force_all:
              today_brands = brands
          else:
              day = date.today().timetuple().tm_yday
              total_slots = (len(brands) + per_day - 1) // per_day
              slot = day % total_slots
              start = slot * per_day
              today_brands = brands[start:start + per_day]

          print(f'Today slot brands ({len(today_brands)}): {today_brands}')

          with open('today_brands.json', 'w') as f:
              json.dump(today_brands, f)
          PY

      - name: Upload exchange rate artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: exchange-rate
          path: shared/data/exchange-rate.json
          retention-days: 1

      - name: Upload brand rotation artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: today-brands
          path: today_brands.json
          retention-days: 1

  # ==================================================================
  # Job 2: Parallel scraping via matrix strategy
  # ==================================================================
  scrape:
    needs: fetch-rate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        source:
          - name: hasznaltauto
            script: hasznaltauto
            max_per_model: 50
            output: shared/data/hasznaltauto-prices.json
          - name: ooyyo
            script: ooyyo
            max_per_model: 30
            output: shared/data/ooyyo-prices.json
          - name: autobazar
            script: autobazar
            max_per_model: 60
            output: shared/data/autobazar-prices.json
          - name: bazos
            script: bazos
            max_per_model: 40
            output: shared/data/bazos-prices.json

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download exchange rate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: exchange-rate
          path: shared/data/

      - name: Download brand rotation
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: today-brands
          path: /tmp/

      # Optional TLS-impersonation transport for Cloudflare-protected sources
      # (hasznaltauto.hu). Best-effort: scrapers fall back to system curl /
      # urllib if the install fails.
      - name: Install curl_cffi (browser TLS impersonation, best-effort)
        run: pip install 'curl_cffi>=0.13,<1.0' || echo "::warning title=curl_cffi install failed::Falling back to system curl/urllib transports"

      # Matrix values come from this workflow file (trusted source),
      # but pass via env for defence-in-depth consistency.
      #
      # Exit-code contract with run-scraper.py (2026-07-17):
      #   0  -> data collected, cell green
      #   78 -> source DEGRADED (0 observations / excessive failures, e.g.
      #         bot-blocking). Cell stays green with a ::warning so ONE dead
      #         source can't turn the whole daily pipeline red — the
      #         aggregate job alerts via issue instead (see health step).
      #   other -> real crash, cell goes red.
      - name: Run ${{ matrix.source.name }} scraper
        env:
          SCRAPER: ${{ matrix.source.script }}
          MAX_PER_MODEL: ${{ matrix.source.max_per_model }}
          OUTPUT: ${{ matrix.source.output }}
        run: |
          set +e
          python scripts/run-scraper.py \
            --scraper "$SCRAPER" \
            --brands-file /tmp/today_brands.json \
            --max "$MAX_PER_MODEL" \
            --output "$OUTPUT"
          rc=$?
          set -e
          if [ "$rc" -eq 78 ]; then
            echo "::warning title=Source degraded::$SCRAPER produced no/low data (likely bot-block or site change). Remaining sources keep the pipeline alive."
          elif [ "$rc" -ne 0 ]; then
            exit "$rc"
          fi

      # Per-scraper post-condition: report observation count. 0 observations
      # is a WARNING (degraded source — alerting happens in aggregate),
      # a missing/corrupt file after a green scraper step is an error.
      # Heredoc is safe: no `${{ }}` interpolation inside the Python body.
      - name: Report scraper output stats
        if: always()
        env:
          OUTPUT_FILE: ${{ matrix.source.output }}
        run: |
          set -e
          if [ ! -s "$OUTPUT_FILE" ]; then
            echo "::error title=Missing output::$OUTPUT_FILE missing or empty despite scraper exiting cleanly"
            exit 1
          fi
          OBS=$(python3 <<'PY'
          import json
          import os

          path = os.environ['OUTPUT_FILE']
          with open(path) as f:
              d = json.load(f)

          count = 0
          for brand, models in d.get('brands', {}).items():
              for model, years in models.items():
                  if not isinstance(years, dict):
                      continue
                  for year, val in years.items():
                      if isinstance(val, dict) and (val.get('avg') or val.get('prices')):
                          count += 1
                      elif isinstance(val, list) and val:
                          count += 1
          print(count)
          PY
          )
          if [ "$OBS" -lt 1 ]; then
            echo "::warning title=No observations::$OUTPUT_FILE has 0 observations"
          else
            echo "::notice::$OUTPUT_FILE: $OBS observations"
          fi

      - name: Upload scraper output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scraper-${{ matrix.source.name }}
          path: ${{ matrix.source.output }}
          retention-days: 1
          if-no-files-found: ignore

  # ==================================================================
  # Job 3: Aggregate all sources, validate, commit
  # ==================================================================
  aggregate:
    needs: [scrape]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Elevated: this job commits, opens PR, opens failure issues (DEVOPS-H5).
    # Job-level permissions REPLACE workflow-level in GitHub Actions — must
    # restate all needed grants here.
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download exchange rate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: exchange-rate
          path: shared/data/

      - name: Download hasznaltauto output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scraper-hasznaltauto
          path: shared/data/
        continue-on-error: true

      - name: Download ooyyo output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scraper-ooyyo
          path: shared/data/
        continue-on-error: true

      - name: Download autobazar output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scraper-autobazar
          path: shared/data/
        continue-on-error: true

      - name: Download bazos output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scraper-bazos
          path: shared/data/
        continue-on-error: true

      - name: List downloaded artifacts
        run: |
          echo "=== shared/data/ contents ==="
          ls -la shared/data/ || echo "No shared/data directory"

      - name: Aggregate all price sources
        run: python scripts/aggregate-prices.py

      # Heredoc safe: no `${{ }}` interpolation inside. Pure Python.
      - name: Validate output JSON
        run: |
          python <<'PY'
          import json
          import sys

          with open('shared/data/hungarian-market-prices.json') as f:
              data = json.load(f)

          errors = []

          if 'brands' not in data:
              errors.append('Missing brands key')

          brands = data.get('brands', {})

          # NOTE: The ">= 20 brands" guard was removed here — aggregate-prices.py
          # now owns brand-count gating (with graceful-regression logic from the
          # data-engineer change). Keeping it in two places caused config drift.

          invalid_count = 0
          for brand, models in brands.items():
              for model, years in models.items():
                  for year, prices in years.items():
                      if not isinstance(prices, dict):
                          continue
                      p_min = prices.get('min', 0)
                      p_avg = prices.get('avg', 0)
                      p_max = prices.get('max', 0)
                      if not (p_min > 0 and p_min <= p_avg <= p_max):
                          invalid_count += 1
                          if invalid_count <= 5:
                              errors.append(f'{brand} {model} {year}: min={p_min} avg={p_avg} max={p_max}')

          if invalid_count > 0:
              errors.append(f'Total invalid price entries: {invalid_count}')

          if errors:
              print('Validation FAILED:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)

          meta = data.get('_meta', {})
          print('Validation passed:')
          print(f'  Brands: {len(brands)}')
          print(f'  Sources: {meta.get("sources", "unknown")}')
          print(f'  Total observations: {meta.get("total_observations", "?")}')
          print(f'  Published price points: {meta.get("published_price_points", "?")}')
          PY

      # Per-source health census for the alerting step below. Runs before the
      # commit step so alerting works even if the commit step fails.
      - name: Compute per-source health
        id: health
        if: always()
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          SOURCES = {
              "hasznaltauto.hu": "shared/data/hasznaltauto-prices.json",
              "ooyyo.com": "shared/data/ooyyo-prices.json",
              "autobazar.eu": "shared/data/autobazar-prices.json",
              "bazos.sk": "shared/data/bazos-prices.json",
          }

          def count_obs(path):
              try:
                  with open(path, encoding="utf-8") as f:
                      d = json.load(f)
              except (OSError, json.JSONDecodeError):
                  return 0
              # Only count fresh files (downloaded artifacts overwrite the
              # checked-in ones; a checked-in stale file still counts obs,
              # which is fine — staleness shows up as "no data changes").
              n = 0
              for models in d.get("brands", {}).values():
                  if not isinstance(models, dict):
                      continue
                  for years in models.values():
                      if not isinstance(years, dict):
                          continue
                      for val in years.values():
                          if isinstance(val, dict) and (val.get("avg") or val.get("prices")):
                              n += 1
                          elif isinstance(val, list) and val:
                              n += 1
              return n

          counts = {name: count_obs(path) for name, path in SOURCES.items()}
          degraded = sorted(name for name, n in counts.items() if n == 0)
          summary = ", ".join(f"{k}={v}" for k, v in sorted(counts.items()))
          import sys
          print(f"Source health: {summary}", file=sys.stderr)
          print(f"summary={summary}")
          print(f"degraded={','.join(degraded)}")
          print(f"degraded_count={len(degraded)}")
          PY

      # Commit strategy (2026-07-17 rewrite): push the daily data DIRECTLY to
      # main. The previous branch->PR->auto-merge flow never landed a single
      # PR in ~3 months: `gh pr create` with GITHUB_TOKEN requires the repo
      # setting "Allow GitHub Actions to create and approve pull requests",
      # which is disabled here — every run pushed an orphan data/price-update-*
      # branch (85 piled up) and then died with exit 1. Direct push needs only
      # `contents: write`, which this job already has. The branch+PR path is
      # kept as a guarded FALLBACK for the case main gets branch protection
      # later; no gh failure can fail the job any more.
      - name: Commit updated data to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shared/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: Daily price update (multi-source aggregation) [skip ci]"

          # Direct push with rebase-retry (main may have moved during the run)
          PUSHED=0
          for i in 1 2 3; do
            if git push origin HEAD:main; then
              PUSHED=1
              break
            fi
            echo "Push attempt $i failed — rebasing onto latest main and retrying..."
            git pull --rebase origin main || true
            sleep 5
          done

          if [ "$PUSHED" -eq 1 ]; then
            echo "::notice title=Data updated::Daily price data pushed to main."
            exit 0
          fi

          # Fallback: branch + PR (works only if the repo later enables
          # 'Allow GitHub Actions to create and approve pull requests').
          echo "::warning title=Direct push failed::Falling back to branch + PR flow."
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="data/price-update-$DATE"
          git checkout -B "$BRANCH"
          git push --force origin "$BRANCH" || {
            echo "::error title=Cannot push::Neither main nor $BRANCH accepts pushes — check token permissions."
            exit 1
          }
          if gh pr view "$BRANCH" --json number -q .number 2>/dev/null; then
            echo "PR already exists for $BRANCH."
          else
            gh pr create --base main --head "$BRANCH" \
              --title "chore: Daily price update $DATE" \
              --body "Automated daily price aggregation commit. Direct push to main was rejected, so this PR was opened instead. Enable 'Allow GitHub Actions to create and approve pull requests' in Settings -> Actions -> General for this flow to work unattended." \
              --label "automated" || \
              echo "::warning title=PR creation failed::Branch $BRANCH pushed but PR could not be opened (repo setting 'Allow GitHub Actions to create and approve pull requests' is likely disabled). Data is on the branch awaiting manual merge."
            gh pr merge "$BRANCH" --auto --squash --delete-branch || true
          fi

      # Alerting (2026-07-17 rewrite), three outcomes:
      #   1. HARD FAILURE (aggregate failed or a scraper crashed)
      #      -> open/keep a "pipeline failing" issue.
      #   2. DEGRADED (run green, but >=1 source produced 0 observations)
      #      -> open/keep a "sources degraded" issue listing dead sources.
      #   3. HEALTHY -> auto-close any open pipeline-failure issues.
      # De-duplicates by title so the daily cron never spams.
      # All untrusted values (run URL, date) are built from context + Date —
      # no user-controlled input is interpolated.
      - name: Pipeline alerting (open/close tracking issue)
        if: ${{ !cancelled() }}
        env:
          DEGRADED_SOURCES: ${{ steps.health.outputs.degraded }}
          HEALTH_SUMMARY: ${{ steps.health.outputs.summary }}
          HARD_FAILURE: ${{ (needs.scrape.result == 'failure' || job.status == 'failure') && 'true' || 'false' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            const hardFailure = process.env.HARD_FAILURE === 'true';
            const degraded = (process.env.DEGRADED_SOURCES || '').split(',').filter(Boolean);
            const summary = process.env.HEALTH_SUMMARY || 'unknown';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().split('T')[0];

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'pipeline-failure',
            });

            const openAlert = async (kind, title, bodyLines) => {
              if (issues.some(i => i.title.includes(kind))) {
                console.log(`Existing "${kind}" issue open — not duplicating`);
                return;
              }
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: bodyLines.join('\n'),
                labels: ['pipeline-failure', 'automated'],
              });
            };

            if (hardFailure) {
              await openAlert(
                'Market price pipeline failing',
                `[Auto] Market price pipeline failing — ${today}`,
                [
                  'The scheduled "Update Market Prices" workflow failed.',
                  '',
                  `- Run: ${runUrl}`,
                  `- Source health: ${summary}`,
                  '- Please investigate the failing job logs.',
                  '',
                  'This issue was auto-created by the workflow. It will not duplicate — it closes automatically once a run is fully healthy.',
                ],
              );
              return;
            }

            if (degraded.length > 0) {
              await openAlert(
                'Market price sources degraded',
                `[Auto] Market price sources degraded — ${degraded.join(', ')}`,
                [
                  'The daily price pipeline is running, but these sources produced 0 observations:',
                  '',
                  ...degraded.map(s => `- **${s}** (likely bot-blocking or a site redesign)`),
                  '',
                  `- Run: ${runUrl}`,
                  `- Source health: ${summary}`,
                  '',
                  'The pipeline keeps publishing from the remaining sources.',
                  'This issue was auto-created by the workflow. It will not duplicate — it closes automatically once all sources deliver data again.',
                ],
              );
              return;
            }

            // Fully healthy — close any open auto-alerts.
            for (const issue of issues) {
              if (issue.title.startsWith('[Auto] Market price')) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `Resolved: all sources delivered data on ${today} (${summary}). Run: ${runUrl}`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
                console.log(`Closed resolved issue #${issue.number}`);
              }
            }
