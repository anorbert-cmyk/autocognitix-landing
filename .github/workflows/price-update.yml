name: Update Market Prices

on:
  schedule:
    - cron: '0 4 * * *'  # Daily at 4 AM UTC
  workflow_dispatch:
    inputs:
      force_full_refresh:
        description: 'Force refresh all brands (ignore rotation)'
        type: boolean
        default: false

# Prevent overlapping cron + manual runs from double-pushing (DEVOPS-L4).
# cancel-in-progress: false — let the current run finish, then gate the next.
concurrency:
  group: price-update
  cancel-in-progress: false

# Workflow-level default: read-only (DEVOPS-H5). Only aggregate job elevates.
# issues: write is needed at workflow level so the `if: failure()` notification
# step in `aggregate` can open a tracking issue when the pipeline breaks.
permissions:
  contents: read
  issues: write

env:
  # 5 brands per day rotation — cycles through all 25 brands in 5 days
  BRANDS_PER_DAY: 5
  PYTHON_VERSION: '3.11'

jobs:
  # ==================================================================
  # Job 1: Fetch MNB exchange rate + determine today's brand rotation
  # ==================================================================
  fetch-rate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Fetch MNB exchange rate
        run: python scripts/fetch-mnb-rate.py

      # DEVOPS-H6: Pass workflow inputs/env via `env:` and read with os.environ
      # inside Python — never interpolate `${{ ... }}` into `python -c "..."` bodies.
      - name: Determine brand rotation
        id: rotation
        env:
          FORCE_FULL_REFRESH: ${{ inputs.force_full_refresh }}
          BRANDS_PER_DAY: ${{ env.BRANDS_PER_DAY }}
        run: |
          python <<'PY'
          import json
          import os
          from datetime import date

          brands = [
              'Suzuki', 'Opel', 'Volkswagen', 'Toyota', 'Ford',
              'Skoda', 'BMW', 'Mercedes-Benz', 'Audi', 'Renault',
              'Peugeot', 'Citroen', 'Hyundai', 'Kia', 'Fiat',
              'Dacia', 'Honda', 'Mazda', 'Nissan', 'Seat',
              'Volvo', 'Mitsubishi', 'Jeep', 'Alfa Romeo', 'Mini',
          ]

          force_all = os.environ.get('FORCE_FULL_REFRESH', 'false').lower() == 'true'
          per_day = int(os.environ.get('BRANDS_PER_DAY', '5'))

          if force_all:
              today_brands = brands
          else:
              day = date.today().timetuple().tm_yday
              total_slots = (len(brands) + per_day - 1) // per_day
              slot = day % total_slots
              start = slot * per_day
              today_brands = brands[start:start + per_day]

          print(f'Today slot brands ({len(today_brands)}): {today_brands}')

          with open('today_brands.json', 'w') as f:
              json.dump(today_brands, f)
          PY

      - name: Upload exchange rate artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: exchange-rate
          path: shared/data/exchange-rate.json
          retention-days: 1

      - name: Upload brand rotation artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: today-brands
          path: today_brands.json
          retention-days: 1

  # ==================================================================
  # Job 2: Parallel scraping via matrix strategy
  # ==================================================================
  scrape:
    needs: fetch-rate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        source:
          - name: hasznaltauto
            script: hasznaltauto
            max_per_model: 50
            output: shared/data/hasznaltauto-prices.json
          - name: ooyyo
            script: ooyyo
            max_per_model: 30
            output: shared/data/ooyyo-prices.json
          - name: autobazar
            script: autobazar
            max_per_model: 60
            output: shared/data/autobazar-prices.json
          - name: bazos
            script: bazos
            max_per_model: 40
            output: shared/data/bazos-prices.json

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download exchange rate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: exchange-rate
          path: shared/data/

      - name: Download brand rotation
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: today-brands
          path: /tmp/

      # Matrix values come from this workflow file (trusted source),
      # but pass via env for defence-in-depth consistency.
      # run-scraper.py now exits(1) on silent-empty output (backend-engineer
      # change). We let matrix cells fail loudly instead of masking with
      # continue-on-error. `fail-fast: false` above ensures other scrapers
      # keep running; aggregate job still runs via `if: always()`.
      - name: Run ${{ matrix.source.name }} scraper
        env:
          SCRAPER: ${{ matrix.source.script }}
          MAX_PER_MODEL: ${{ matrix.source.max_per_model }}
          OUTPUT: ${{ matrix.source.output }}
        run: |
          python scripts/run-scraper.py \
            --scraper "$SCRAPER" \
            --brands-file /tmp/today_brands.json \
            --max "$MAX_PER_MODEL" \
            --output "$OUTPUT"

      # Per-scraper post-condition: the output JSON must exist and contain
      # at least MIN_OBS observations. Catches the silent-empty failure mode
      # that hid behind continue-on-error for 30 days.
      # Heredoc is safe: no `${{ }}` interpolation inside the Python body.
      - name: Validate scraper output non-empty
        if: always()
        env:
          OUTPUT_FILE: ${{ matrix.source.output }}
          MIN_OBS: '1'
        run: |
          set -e
          if [ ! -s "$OUTPUT_FILE" ]; then
            echo "::error title=Empty output::$OUTPUT_FILE missing or empty"
            exit 1
          fi
          OBS=$(python3 <<'PY'
          import json
          import os

          path = os.environ['OUTPUT_FILE']
          with open(path) as f:
              d = json.load(f)

          count = 0
          for brand, models in d.get('brands', {}).items():
              for model, years in models.items():
                  if not isinstance(years, dict):
                      continue
                  for year, val in years.items():
                      if isinstance(val, dict) and (val.get('avg') or val.get('prices')):
                          count += 1
                      elif isinstance(val, list) and val:
                          count += 1
          print(count)
          PY
          )
          echo "::notice::$OUTPUT_FILE: $OBS observations"
          if [ "$OBS" -lt "$MIN_OBS" ]; then
            echo "::error title=Insufficient data::$OUTPUT_FILE has only $OBS observations (min $MIN_OBS)"
            exit 1
          fi

      - name: Upload scraper output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scraper-${{ matrix.source.name }}
          path: ${{ matrix.source.output }}
          retention-days: 1
          if-no-files-found: ignore

  # ==================================================================
  # Job 3: Aggregate all sources, validate, commit
  # ==================================================================
  aggregate:
    needs: [scrape]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Elevated: this job commits, opens PR, opens failure issues (DEVOPS-H5).
    # Job-level permissions REPLACE workflow-level in GitHub Actions — must
    # restate all needed grants here.
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download exchange rate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: exchange-rate
          path: shared/data/

      - name: Download hasznaltauto output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scraper-hasznaltauto
          path: shared/data/
        continue-on-error: true

      - name: Download ooyyo output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scraper-ooyyo
          path: shared/data/
        continue-on-error: true

      - name: Download autobazar output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scraper-autobazar
          path: shared/data/
        continue-on-error: true

      - name: Download bazos output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scraper-bazos
          path: shared/data/
        continue-on-error: true

      - name: List downloaded artifacts
        run: |
          echo "=== shared/data/ contents ==="
          ls -la shared/data/ || echo "No shared/data directory"

      - name: Aggregate all price sources
        run: python scripts/aggregate-prices.py

      # Heredoc safe: no `${{ }}` interpolation inside. Pure Python.
      - name: Validate output JSON
        run: |
          python <<'PY'
          import json
          import sys

          with open('shared/data/hungarian-market-prices.json') as f:
              data = json.load(f)

          errors = []

          if 'brands' not in data:
              errors.append('Missing brands key')

          brands = data.get('brands', {})

          # NOTE: The ">= 20 brands" guard was removed here — aggregate-prices.py
          # now owns brand-count gating (with graceful-regression logic from the
          # data-engineer change). Keeping it in two places caused config drift.

          invalid_count = 0
          for brand, models in brands.items():
              for model, years in models.items():
                  for year, prices in years.items():
                      if not isinstance(prices, dict):
                          continue
                      p_min = prices.get('min', 0)
                      p_avg = prices.get('avg', 0)
                      p_max = prices.get('max', 0)
                      if not (p_min > 0 and p_min <= p_avg <= p_max):
                          invalid_count += 1
                          if invalid_count <= 5:
                              errors.append(f'{brand} {model} {year}: min={p_min} avg={p_avg} max={p_max}')

          if invalid_count > 0:
              errors.append(f'Total invalid price entries: {invalid_count}')

          if errors:
              print('Validation FAILED:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)

          meta = data.get('_meta', {})
          print('Validation passed:')
          print(f'  Brands: {len(brands)}')
          print(f'  Sources: {meta.get("sources", "unknown")}')
          print(f'  Total observations: {meta.get("total_observations", "?")}')
          print(f'  Published price points: {meta.get("published_price_points", "?")}')
          PY

      - name: Commit updated data to branch + open PR (branch-protection compatible)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shared/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit — skipping PR."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="data/price-update-$DATE"
          git checkout -b "$BRANCH"
          git commit -m "chore: Daily price update (multi-source aggregation) [skip ci]"
          git push --force origin "$BRANCH"
          # Open PR (or reuse existing) + enable auto-merge
          if gh pr view "$BRANCH" --json number -q .number 2>/dev/null; then
            echo "PR already exists for $BRANCH — pushing update"
          else
            gh pr create --base main --head "$BRANCH" \
              --title "chore: Daily price update $DATE" \
              --body "Automated daily price aggregation commit.\nSources that contributed live data this run are listed in the aggregate job log.\n\nThis PR is opened automatically by the Update Market Prices workflow. Merging will update the production baseline." \
              --label "automated"
            # Enable auto-merge squash so it lands without manual review (if branch protection allows)
            gh pr merge "$BRANCH" --auto --squash --delete-branch || \
              echo "::warning::auto-merge not enabled (likely missing admin right on GITHUB_TOKEN) — PR left open for manual review"
          fi

      # Failure alerting: if any preceding step in this job (or any upstream
      # job via `needs`) failed, open a single tracking issue. De-duplicates
      # against existing open `pipeline-failure` issues so we don't spam.
      # All untrusted values (run URL, date) are built from context + Date —
      # no user-controlled input is interpolated.
      - name: Open issue on failure
        # Fire if aggregate itself fails OR any scrape matrix cell failed.
        # Graceful-regression makes aggregate succeed even when scrapers break,
        # but we still want alerting when the data source is degraded.
        if: failure() || needs.scrape.result == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'pipeline-failure',
            });
            if (issues.some(i => i.title.includes('Market price pipeline failing'))) {
              console.log('Existing pipeline-failure issue open — not duplicating');
              return;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Auto] Market price pipeline failing — ${today}`,
              body: [
                'The scheduled "Update Market Prices" workflow failed.',
                '',
                `- Run: ${runUrl}`,
                '- Triggered by: scheduled cron 04:00 UTC',
                '- Please investigate scraper silent-empty or aggregate regression.',
                '',
                'This issue was auto-created by the workflow. It will not duplicate — close when resolved.',
              ].join('\n'),
              labels: ['pipeline-failure', 'automated'],
            });
