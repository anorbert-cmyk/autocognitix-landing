name: Export Backend Data

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday 3 AM UTC
  workflow_dispatch:  # Manual trigger

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install asyncpg aiofiles

      - name: Export vehicle pricing data
        env:
          DATABASE_URL: ${{ secrets.BACKEND_DB_READ_URL }}
        run: python scripts/export-vehicle-data.py

      - name: Export DTC database
        env:
          DATABASE_URL: ${{ secrets.BACKEND_DB_READ_URL }}
        run: python scripts/export-dtc-data.py

      - name: Export repair costs
        env:
          DATABASE_URL: ${{ secrets.BACKEND_DB_READ_URL }}
        run: python scripts/export-repair-costs.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shared/data/
          git diff --staged --quiet || git commit -m "chore: Update static data export [skip ci]"
          git push
