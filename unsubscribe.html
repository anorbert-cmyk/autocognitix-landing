<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe | AutoCognitix</title>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Funnel Sans', system-ui, -apple-system, sans-serif;
            background-color: #F2F2F4;
            color: #12110E;
            line-height: 1.6;
        }

        header {
            background-color: #12110E;
            color: white;
            padding: 20px 40px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .container {
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .card h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #12110E;
        }

        .card p {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
        }

        .card .subtitle {
            font-size: 14px;
            color: #999;
            font-style: italic;
            margin-bottom: 30px;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 24px;
            background-color: #12110E;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: opacity 0.3s ease;
        }

        .back-link:hover {
            opacity: 0.9;
        }

        .divider {
            height: 1px;
            background-color: #E5E5E7;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>AutoCognitix</h1>
    </header>

    <div class="container">
        <div class="card">
            <h2>Sikeresen leiratkoztál</h2>
            <h2>You have been unsubscribed</h2>
            <div class="divider"></div>
            <p>Sajnáljuk, hogy távozol!</p>
            <p>Sorry to see you go!</p>
            <p class="subtitle">Nem fogsz több értesítést kapni. / You won't receive further notifications.</p>
            <a href="/" class="back-link">← Vissza a kezdőoldalra / Back to Homepage</a>
        </div>
    </div>

    <script>
        // Extract token from URL and process unsubscription
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (token) {
            // Call n8n webhook to process unsubscription
            fetch('https://valid8strategy.app.n8n.cloud/webhook/newsletter-email', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    type: 'unsubscribe',
                    token: token
                })
            })
            .catch(error => {
                // Silently fail - user sees success message regardless
                console.error('Unsubscribe webhook error:', error);
            });
        }
    </script>
</body>
</html>
